<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Lista de imagens</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item *ngFor="let item of lista">
      <ion-thumbnail slot="start">
        <ion-img [src]="item.imagem"></ion-img>
      </ion-thumbnail>
      <ion-label>
        <h2>{{ item.titulo }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
